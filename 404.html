<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found | STACKLY</title>
  <meta name="description" content="The page you are looking for does not exist or has been moved.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- 404 Error Section -->
  <section class="error-section" style="background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('images/404c.webp') center/cover no-repeat, var(--bg-darker);">
    <div class="container">
      <div class="error-content">
        <div class="error-badge">
          <i class="ri-error-warning-fill"></i> Error
        </div>
        <h1 class="error-code">404</h1>
        <h2 class="error-title">Page Not Found</h2>
        <p class="error-description">
          The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.
        </p>
        <div class="error-actions">
          <a href="index.html" class="btn btn-primary btn-lg">
            <i class="ri-home-4-line"></i> Back to Home
          </a>
          <a href="javascript:history.back()" class="btn btn-outline btn-lg">
            <i class="ri-arrow-go-back-line"></i> Go Back
          </a>
        </div>
        <div class="error-links">
          <p>Or try one of these pages:</p>
          <div class="error-links-grid">
            <a href="services.html" class="error-link-card">
              <i class="ri-service-line"></i>
              <span>Services</span>
            </a>
            <a href="portfolio.html" class="error-link-card">
              <i class="ri-briefcase-4-line"></i>
              <span>Portfolio</span>
            </a>
            <a href="pricing.html" class="error-link-card">
              <i class="ri-money-dollar-circle-line"></i>
              <span>Pricing</span>
            </a>
            <a href="contact.html" class="error-link-card">
              <i class="ri-mail-send-line"></i>
              <span>Contact</span>
            </a>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script src="js/shared.js"></script>
</body>
</html>
